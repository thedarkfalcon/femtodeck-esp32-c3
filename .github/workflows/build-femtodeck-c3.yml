name: Build FemtoDeck C3

on:
  push:
    branches:
      - "**"
    tags:
      - "v*"
    paths:
      - "femtodeck-c3/**"
      - "README.md"
      - "RELEASE_NOTES.md"
      - "sim/**"
      - ".github/workflows/build-femtodeck-c3.yml"
  pull_request:
    paths:
      - "femtodeck-c3/**"
      - "README.md"
      - "RELEASE_NOTES.md"
      - "sim/**"
      - ".github/workflows/build-femtodeck-c3.yml"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  compile:
    runs-on: ubuntu-latest
    outputs:
      build_text: ${{ steps.package.outputs.build_text }}
      site_url: ${{ steps.site.outputs.site_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup arduino-cli
        uses: arduino/setup-arduino-cli@v2

      - name: Cache Arduino data
        uses: actions/cache@v4
        with:
          path: |
            ~/.arduino15
            ~/Arduino
          key: ${{ runner.os }}-arduino-${{ hashFiles('femtodeck-c3/**', '.github/workflows/build-femtodeck-c3.yml') }}
          restore-keys: |
            ${{ runner.os }}-arduino-

      - name: Configure board manager URLs
        run: arduino-cli config init --overwrite && arduino-cli config set board_manager.additional_urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install ESP32 core
        run: arduino-cli core update-index && arduino-cli core install esp32:esp32

      - name: Install libraries
        run: arduino-cli lib install U8g2 "NimBLE-Arduino"

      - name: Compile sketch
        run: arduino-cli compile --export-binaries --fqbn esp32:esp32:esp32c3 femtodeck-c3

      - name: Package firmware
        id: package
        shell: bash
        run: |
          set -euo pipefail

          build_dir="femtodeck-c3/build/esp32.esp32.esp32c3"
          firmware_dir="dist/femtodeck-c3"
          mkdir -p "$firmware_dir"

          cp "$build_dir/femtodeck-c3.ino.merged.bin" "$firmware_dir/femtodeck-c3-merged.bin"
          cp "$build_dir/femtodeck-c3.ino.bin" "$firmware_dir/femtodeck-c3-app.bin"
          cp "$build_dir/femtodeck-c3.ino.bootloader.bin" "$firmware_dir/bootloader.bin"
          cp "$build_dir/femtodeck-c3.ino.partitions.bin" "$firmware_dir/partitions.bin"
          cp "$build_dir/boot_app0.bin" "$firmware_dir/boot_app0.bin"

          build_text="$(sed -nE 's/.*BUILD_TEXT = "([^"]+)".*/\1/p' femtodeck-c3/Version.h)"
          if [[ -z "$build_text" ]]; then
            build_text="local-build"
          fi

          cat > "$firmware_dir/flash-windows.bat" <<'EOF'
          @echo off
          set PORT=%1
          if "%PORT%"=="" (
            echo Usage: flash-windows.bat COM9
            exit /b 1
          )
          python -m pip install --upgrade esptool
          python -m esptool --chip esp32c3 --port %PORT% --baud 460800 write_flash -z 0x0 femtodeck-c3-merged.bin
          EOF

          cat > "$firmware_dir/flash-linux-mac.sh" <<'EOF'
          #!/usr/bin/env sh
          set -eu
          PORT="${1:-}"
          if [ -z "$PORT" ]; then
            echo "Usage: ./flash-linux-mac.sh /dev/ttyACM0" >&2
            exit 1
          fi
          python3 -m pip install --upgrade esptool
          python3 -m esptool --chip esp32c3 --port "$PORT" --baud 460800 write_flash -z 0x0 femtodeck-c3-merged.bin
          EOF
          chmod +x "$firmware_dir/flash-linux-mac.sh"

          cat > "$firmware_dir/README-FLASH.txt" <<EOF
          FemtoDeck C3 firmware package
          Build: $build_text

          Browser flashing:
          Open the FemtoDeck C3 web installer from the project GitHub Pages site.

          Fallback flashing with esptool:
          Windows:
            flash-windows.bat COM9

          macOS/Linux:
            ./flash-linux-mac.sh /dev/ttyACM0

          Manual esptool command:
            python -m esptool --chip esp32c3 --port COM9 --baud 460800 write_flash -z 0x0 femtodeck-c3-merged.bin

          Raw split binaries are also included for advanced users:
            bootloader.bin      offset 0x0
            partitions.bin      offset 0x8000
            boot_app0.bin       offset 0xe000
            femtodeck-c3-app.bin offset 0x10000
          EOF

          (cd dist && python3 -m zipfile -c femtodeck-c3-firmware.zip femtodeck-c3)
          echo "build_text=$build_text" >> "$GITHUB_OUTPUT"

      - name: Build web installer
        id: site
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p site/firmware
          cp dist/femtodeck-c3/femtodeck-c3-merged.bin site/firmware/femtodeck-c3-merged.bin
          cp -R sim site/simulator

          cat > site/manifest.json <<EOF
          {
            "name": "FemtoDeck C3",
            "version": "${{ steps.package.outputs.build_text }}",
            "builds": [
              {
                "chipFamily": "ESP32-C3",
                "parts": [
                  {
                    "path": "firmware/femtodeck-c3-merged.bin",
                    "offset": 0
                  }
                ]
              }
            ]
          }
          EOF

          cat > site/index.html <<'EOF'
          <!doctype html>
          <html lang="en">
            <head>
              <meta charset="utf-8">
              <meta name="viewport" content="width=device-width, initial-scale=1">
              <title>FemtoDeck C3 Installer</title>
              <script type="module" src="https://unpkg.com/esp-web-tools@10/dist/web/install-button.js"></script>
              <style>
                :root {
                  color-scheme: dark;
                  font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
                  background: #10141c;
                  color: #eef3ff;
                }
                body {
                  margin: 0;
                  min-height: 100vh;
                  display: grid;
                  place-items: center;
                  padding: 24px;
                }
                main {
                  width: min(680px, 100%);
                  border: 1px solid #334155;
                  border-radius: 8px;
                  padding: 24px;
                  background: #171d28;
                }
                h1 {
                  margin: 0 0 8px;
                  font-size: 28px;
                }
                p, li {
                  color: #b8c2d6;
                  line-height: 1.5;
                }
                esp-web-install-button {
                  margin: 18px 0;
                }
                .actions {
                  display: flex;
                  flex-wrap: wrap;
                  gap: 12px;
                  margin: 18px 0;
                }
                a.button {
                  display: inline-flex;
                  align-items: center;
                  min-height: 36px;
                  padding: 0 14px;
                  border: 1px solid #64748b;
                  border-radius: 6px;
                  color: #eef3ff;
                  text-decoration: none;
                  background: #243044;
                }
                a.button:hover {
                  background: #2f3c52;
                }
                code {
                  background: #0b1020;
                  border: 1px solid #273244;
                  border-radius: 4px;
                  padding: 2px 5px;
                }
              </style>
            </head>
            <body>
              <main>
                <h1>FemtoDeck C3 Installer</h1>
                <p>Flash FemtoDeck C3 onto an ESP32-C3 with the 0.42 inch OLED module.</p>
                <esp-web-install-button manifest="manifest.json"></esp-web-install-button>
                <div class="actions">
                  <a class="button" href="simulator/">Open Simulator</a>
                </div>
                <ol>
                  <li>Use Chrome or Edge on desktop.</li>
                  <li>Connect the ESP32-C3 over USB.</li>
                  <li>Click Install and choose the device serial port.</li>
                </ol>
                <p>If flashing fails, hold BOOT while plugging the board in, then try again.</p>
                <p>Fallback binaries and scripts are attached to tagged GitHub releases.</p>
              </main>
            </body>
          </html>
          EOF

          echo "site_url=https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/" >> "$GITHUB_OUTPUT"

      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: femtodeck-c3-firmware
          path: |
            dist/femtodeck-c3/**
            dist/femtodeck-c3-firmware.zip

      - name: Configure GitHub Pages
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

      - name: Create GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: FemtoDeck C3 ${{ steps.package.outputs.build_text }}
          body: |
            FemtoDeck C3 firmware for ESP32-C3 0.42 inch OLED modules.

            Browser installer:
            ${{ steps.site.outputs.site_url }}

            Fallback flashing:
            Download `femtodeck-c3-firmware.zip`, extract it, and run `flash-windows.bat COM9` or `./flash-linux-mac.sh /dev/ttyACM0`.
          files: |
            dist/femtodeck-c3/femtodeck-c3-merged.bin
            dist/femtodeck-c3-firmware.zip

  deploy-pages:
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
    needs: compile
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
